seeds:
  overview:
    caches: [qmap-de]
    levels: [7]
    coverages: [overview]
  general:
    caches: [qmap-de]
    levels: [8, 9]
    coverages: [general]
  coastal:
    caches: [qmap-de]
    levels: [10, 11]
    coverages: [coastal]
  approach:
    caches: [qmap-de]
    levels: [12, 13, 14]
    coverages: [approach]
  harbour:
    caches: [qmap-de]
    levels: [12, 13, 14, 15]
    coverages: [harbour]
  berthing:
    caches: [qmap-de]
    levels: [12, 13, 14, 15, 16]
    coverages: [berthing]
  rws:
    caches: [qmap-nl]
    levels: [8, 9, 10, 11, 12, 13, 14]
    coverages: [rws]

coverages:
  overview:
    datasource: split/M_COVR.json
    where: uband=1
    srs: "EPSG:4326"
  general:
    datasource: split/M_COVR.json
    where: uband=2
    srs: "EPSG:4326"
  coastal:
    datasource: split/M_COVR.json
    where: uband=3
    srs: "EPSG:4326"
  approach:
    datasource: split/M_COVR.json
    where: uband=4
    srs: "EPSG:4326"
  harbour:
    datasource: split/M_COVR.json
    where: uband=5
    srs: "EPSG:4326"
  berthing:
    datasource: split/M_COVR.json
    where: uband=6
    srs: "EPSG:4326"
  rws:
    datasource: rws/M_COVR.json
    where: CATCOV=1
    srs: "EPSG:4326"
