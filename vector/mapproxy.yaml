globals:
  # image:
  # paletted: true
  # resampling_method: bilinear
  cache:
    link_single_color_images: true
    meta_size: [1, 1]
    meta_buffer: 0
    # bulk_meta_tiles: true
    base_dir: cache_data
  http:
    client_timeout: 300

grids:
  webmercator_512:
    base: GLOBAL_WEBMERCATOR
    tile_size: [512, 512]

services:
  demo:
  tms:
  wms:
  wmts:

sources:
  tiles-de:
    type: tile
    url: http://tileserver:8080/styles/bsh/512/%(tms_path)s.png
    transparent: true
    grid: webmercator_512
    coverage:
      datasource: split/M_COVR.json
      srs: "EPSG:4326"
  tiles-nl:
    type: tile
    url: http://tileserver:8080/styles/rws/512/%(tms_path)s.png
    transparent: true
    grid: webmercator_512
    coverage:
      datasource: rws/M_COVR.json
      srs: "EPSG:4326"

caches:
  qmap-de:
    sources: ["tiles-de"]
    grids: [webmercator_512]
    cache:
      type: mbtiles
      # type: file
      # directory_layout: tms
  qmap-nl:
    sources: ["tiles-nl"]
    grids: [webmercator_512]
    cache:
      type: mbtiles

layers:
  - name: qmap-de
    title: "QMAP DE"
    sources: [qmap-de]
  - name: qmap-nl
    title: "QMAP NL"
    sources: [qmap-nl]
