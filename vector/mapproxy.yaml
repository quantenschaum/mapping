globals:
  # image:
  # paletted: true
  # resampling_method: bilinear
  cache:
    link_single_color_images: true
    meta_size: [1, 1]
    meta_buffer: 0
    # bulk_meta_tiles: true
    base_dir: cache_data
  http:
    client_timeout: 300

services:
  demo:
  tms:
  wms:

sources:
  tiles-de:
    type: tile
    url: http://tileserver:8080/styles/fnc-de/256/%(tms_path)s.png
    transparent: true
    grid: GLOBAL_WEBMERCATOR
    coverage:
      datasource: split/M_COVR.json
      srs: "EPSG:4326"
  tiles-nl:
    type: tile
    url: http://tileserver:8080/styles/fnc-nl/256/%(tms_path)s.png
    transparent: true
    grid: GLOBAL_WEBMERCATOR
    coverage:
      datasource: rws/M_COVR.json
      srs: "EPSG:4326"

caches:
  fnc-de:
    sources: ["tiles-de"]
    grids: [GLOBAL_WEBMERCATOR]
    cache:
      type: mbtiles
      # type: file
      # directory_layout: tms
  fnc-nl:
    sources: ["tiles-nl"]
    grids: [GLOBAL_WEBMERCATOR]
    cache:
      type: mbtiles

layers:
  - name: fnc-de
    title: "FNC DE"
    sources: [fnc-de]
  - name: fnc-nl
    title: "FNC NL"
    sources: [fnc-nl]
